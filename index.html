<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPMD Report - Kabupaten Lombok Utara</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Config for Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sky: { 50: '#f0f9ff', 100: '#e0f2fe', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    },
                    spacing: { 'safe': 'env(safe-area-inset-bottom)' }
                }
            }
        }
    </script>

    <!-- Custom CSS for Printing & Animations -->
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Futuristic Login Animations */
        @keyframes pulseRing {
            0% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(14, 165, 233, 0); }
            100% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }
        .animate-pulse-ring { animation: pulseRing 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        @keyframes scanline {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        .animate-scanline {
            position: absolute; left: 0; right: 0; height: 3px;
            background: #38bdf8; box-shadow: 0 0 15px #38bdf8, 0 0 30px #0ea5e9;
            animation: scanline 1.8s linear infinite; z-index: 10;
        }

        /* Print Specific Styles */
        @media print {
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0;}
            #root { padding: 0; margin: 0; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print\:p-0 { padding: 0 !important; }
            
            input, textarea {
                border: none !important;
                background: transparent !important;
                resize: none !important;
                box-shadow: none !important;
                color: black !important;
            }
            input::placeholder, textarea::placeholder { color: transparent !important; }
            
            .page-break { page-break-after: always; }
            @page { margin: 10mm; size: 210mm 297mm portrait; } /* A4 Portrait */
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .f1-table { border-collapse: collapse; width: 100%; }
        .f1-table th, .f1-table td { border: 1px solid black; font-size: 12px; line-height: 1.4; padding: 6px 8px; vertical-align: middle; }
        .f1-table th { font-weight: bold; text-align: center; background-color: #e5e7eb; }
        /* Hindari baris terpotong di tengah saat halaman A4 berganti (PDF) */
        .f1-table tr { page-break-inside: avoid; }
        
        @media print { .f1-table th { background-color: transparent; } }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- HTML2CANVAS & HTML2PDF untuk Export PDF A4 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- ONESIGNAL SDK SETUP -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "YOUR_ONESIGNAL_APP_ID", // TODO: Ganti dengan App ID OneSignal Anda
          safari_web_id: "web.onesignal.auto.xxxxxx",
          notifyButton: { enable: true },
        });
      });
    </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // --- CONSTANTS ---
        const MONTH_NAMES = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        // --- ICONS SVG ---
        const Icons = {
          Home: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
          FileText: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>,
          ClipboardList: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>,
          CalendarDays: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/></svg>,
          Info: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>,
          LogOut: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
          Plus: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>,
          Trash2: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
          Download: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
          Printer: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>,
          Upload: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
          User: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
          MapPin: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
          Key: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>,
          Search: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
          Shield: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>,
          CheckCircle: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
          Bell: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
          Eye: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
          Edit: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        };

        const { Home, FileText, ClipboardList, CalendarDays, Info, LogOut, Plus, Trash2, Download, Printer, Upload, User, MapPin, Key, Search, Shield, CheckCircle, Bell, Eye, Edit } = Icons;

        // --- LOCAL STORAGE HOOK ---
        function useLocalStorage(key, initialValue) {
          const [storedValue, setStoredValue] = useState(() => {
            try {
              const item = window.localStorage.getItem(key);
              return item ? JSON.parse(item) : initialValue;
            } catch (error) {
              console.log(error);
              return initialValue;
            }
          });
          const setValue = (value) => {
            try {
              const valueToStore = value instanceof Function ? value(storedValue) : value;
              setStoredValue(valueToStore);
              window.localStorage.setItem(key, JSON.stringify(valueToStore));
            } catch (error) {
              console.log(error);
            }
          };
          return [storedValue, setValue];
        }

        // --- APP DATA INITIALIZATION ---
        const initialUsers = [
          { id: 1, username: 'Ahmad Yani', desa: 'Karang Bajo', password: 'developer@004', isDev: true },
          { id: 2, username: 'Ahmad', desa: 'Karang Bajo', password: '123', isDev: false }
        ];

        const initialReports = [
           { id: 1, name: "Ahmad", desa: "Karang Bajo", type: "Laporan Kegiatan", date: "2026-01-15", desc: "Posyandu Keluarga Lansia", percent: "100%", status: "Selesai", month: "Januari" },
           { id: 2, name: "Budi", desa: "Bayan", type: "F/I/Dal/13", date: "2026-02-05", desc: "Laporan Dal Bulanan", percent: "100%", status: "Selesai", month: "Februari" }
        ];

        // --- MAIN APP COMPONENT ---
        function App() {
          const [users, setUsers] = useLocalStorage('spmd_users', initialUsers);
          const [reports, setReports] = useLocalStorage('spmd_reports', initialReports);
          
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [currentUser, setCurrentUser] = useState(null);
          const [currentTab, setCurrentTab] = useState('laporan2'); // Default tab changed

          // GLOBAL EVENT LISTENER: Ensure all typed values are passed to DOM for PDF/Image extraction.
          useEffect(() => {
              const handleDOMInput = (e) => {
                  if (e.target.tagName === 'INPUT') {
                      e.target.setAttribute('value', e.target.value);
                  } else if (e.target.tagName === 'TEXTAREA') {
                      e.target.innerHTML = e.target.value;
                      e.target.style.height = 'auto';
                      e.target.style.height = e.target.scrollHeight + 'px';
                  }
              };
              document.addEventListener('input', handleDOMInput);
              return () => document.removeEventListener('input', handleDOMInput);
          }, []);

          const handleLogin = (user) => {
            setCurrentUser(user);
            setIsLoggedIn(true);
          };

          const handleLogout = () => {
            setIsLoggedIn(false);
            setCurrentUser(null);
          };

          const addReport = (newReport) => {
            setReports([newReport, ...reports]);
          };

          if (!isLoggedIn) {
            return <LoginScreen onLogin={handleLogin} users={users} setUsers={setUsers} />;
          }

          return (
            <MainLayout user={currentUser} onLogout={handleLogout} currentTab={currentTab} setCurrentTab={setCurrentTab} users={users} setUsers={setUsers}>
              {currentTab === 'laporan2' && <KegiatanView user={currentUser} addReport={addReport} />}
              {currentTab === 'laporan1' && <F1Dal13View user={currentUser} />}
              {currentTab === 'absen' && <AbsenView user={currentUser} />}
              {currentTab === 'dashboard' && <DashboardView reports={reports} setReports={setReports} currentUser={currentUser} />}
              {currentTab === 'pengumuman' && <PengumumanView />}
              {currentTab === 'about' && <AboutView />}
              {currentTab === 'dev' && currentUser?.isDev && <DeveloperSettings users={users} />}
            </MainLayout>
          );
        }

        // --- LOGIN SCREEN ---
        function LoginScreen({ onLogin, users, setUsers }) {
          const [isRegistering, setIsRegistering] = useState(false);
          const [username, setUsername] = useState('');
          const [desa, setDesa] = useState('');
          const [password, setPassword] = useState('');
          const [showSplash, setShowSplash] = useState(false);

          const handleSubmit = (e) => {
            e.preventDefault();
            if (isRegistering) {
              if (users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
                alert("Username sudah terdaftar! Gunakan nama lain.");
                return;
              }
              const newUser = { id: Date.now(), username, desa, password, isDev: false };
              setUsers([...users, newUser]);
              alert("Akun berhasil dibuat! Silakan masuk.");
              setIsRegistering(false);
              setPassword('');
            } else {
              const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
              if (user) {
                setShowSplash(true);
                setTimeout(() => {
                   onLogin(user);
                }, 2800);
              } else {
                alert("Username atau Sandi salah!");
              }
            }
          };

          if (showSplash) {
             return (
               <div className="fixed inset-0 bg-gray-900 flex flex-col items-center justify-center z-[100] font-mono text-sky-400 overflow-hidden">
                 <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-sky-900/40 via-gray-900 to-gray-900"></div>
                 <div className="relative mb-10 z-10 flex items-center justify-center">
                    <div className="absolute inset-0 bg-sky-500 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                    <div className="relative w-40 h-40 bg-gray-900 rounded-full animate-pulse-ring flex items-center justify-center overflow-hidden border-2 border-sky-500 shadow-[0_0_30px_rgba(56,189,248,0.5)]">
                       <img src="logo-spmd.png" alt="Logo SPMD" className="w-24 h-24 object-contain z-10 bg-white rounded-full p-1" onError={(e)=>{e.target.style.display='none'}}/>
                       <div className="animate-scanline"></div>
                    </div>
                 </div>
                 <div className="z-10 text-center">
                    <div className="flex items-center justify-center gap-2 mb-2">
                       <CheckCircle className="text-green-400" size={24} />
                       <h2 className="text-2xl font-bold tracking-[0.2em] text-white">OTENTIKASI SUKSES</h2>
                    </div>
                    <p className="text-sm text-sky-300/80 animate-pulse tracking-widest">MEMUAT MODUL SPMD REPORT...</p>
                 </div>
               </div>
             );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-sky-100 to-blue-200 flex items-center justify-center p-4 font-sans">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                <div className="bg-sky-500 p-6 flex justify-between items-center text-white">
                  <img src="logo-spmd.png" alt="Logo SPMD" className="w-12 h-12 object-contain bg-white rounded-full p-1" onError={(e)=>{e.target.style.display='none'}} />
                  <h1 className="text-2xl font-bold tracking-wider text-center flex-1">SPMD Report</h1>
                  <img src="logo-bkkbn.png" alt="Logo BKKBN" className="w-12 h-12 object-contain bg-white rounded-full p-1" onError={(e)=>{e.target.style.display='none'}} />
                </div>
                
                <form onSubmit={handleSubmit} className="p-8 space-y-6">
                  <div className="text-center mb-6">
                    <h2 className="text-gray-700 text-lg font-medium">{isRegistering ? 'Daftar Akun Baru' : 'Selamat Datang Semeton!'}</h2>
                    <p className="text-gray-400 text-sm">{isRegistering ? 'Lengkapi form di bawah' : 'Silakan masuk ke akun Anda'}</p>
                  </div>
                  <div className="relative">
                    <User className="absolute left-3 top-3 text-gray-400" size={20} />
                    <input type="text" placeholder="Username / Nama" required className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400 transition" value={username} onChange={e => setUsername(e.target.value)} />
                  </div>
                  {isRegistering && (
                    <div className="relative animate-fade-in">
                      <MapPin className="absolute left-3 top-3 text-gray-400" size={20} />
                      <input type="text" placeholder="Asal Desa" required className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400 transition" value={desa} onChange={e => setDesa(e.target.value)} />
                    </div>
                  )}
                  <div className="relative">
                    <Key className="absolute left-3 top-3 text-gray-400" size={20} />
                    <input type="password" placeholder="Kata Sandi" required className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400 transition" value={password} onChange={e => setPassword(e.target.value)} />
                  </div>
                  <button type="submit" className="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1">
                    {isRegistering ? 'Daftar Sekarang' : 'Masuk'}
                  </button>
                  <div className="text-center mt-4">
                     <button type="button" onClick={() => setIsRegistering(!isRegistering)} className="text-sm text-sky-600 hover:underline font-medium">
                       {isRegistering ? 'Sudah punya akun? Masuk di sini' : 'Belum punya akun? Daftar di sini'}
                     </button>
                  </div>
                </form>
                <div className="text-center pb-6 text-xs text-gray-400">
                  Program dari BKKBN Kabupaten Lombok Utara
                </div>
              </div>
            </div>
          );
        }

        // --- GANTI SANDI MODAL ---
        function ChangePasswordModal({ user, users, setUsers, onClose }) {
          const [oldPass, setOldPass] = useState('');
          const [newPass, setNewPass] = useState('');

          const handleSave = () => {
            if (user.password !== oldPass) return alert('Sandi lama salah!');
            if (newPass.length < 3) return alert('Sandi baru terlalu pendek!');
            
            const updatedUsers = users.map(u => u.id === user.id ? { ...u, password: newPass } : u);
            setUsers(updatedUsers);
            alert('Sandi berhasil diubah! Silakan login kembali dengan sandi baru jika diperlukan.');
            user.password = newPass;
            onClose();
          };

          return (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100] px-4">
              <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm animate-fade-in">
                <h3 className="text-lg font-bold text-gray-800 mb-4">Ganti Kata Sandi</h3>
                <input type="password" placeholder="Sandi Lama" className="w-full mb-3 p-3 border rounded-xl" value={oldPass} onChange={e=>setOldPass(e.target.value)} />
                <input type="password" placeholder="Sandi Baru" className="w-full mb-4 p-3 border rounded-xl" value={newPass} onChange={e=>setNewPass(e.target.value)} />
                <div className="flex justify-end gap-2">
                  <button onClick={onClose} className="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg">Batal</button>
                  <button onClick={handleSave} className="px-4 py-2 bg-sky-500 text-white rounded-lg font-bold">Simpan</button>

        // --- MAIN LAYOUT ---
        function MainLayout({ children, user, onLogout, currentTab, setCurrentTab, users, setUsers }) {
          const [showPassModal, setShowPassModal] = useState(false);

          // Urutan Menu Diperbarui sesuai permintaan: Kegiatan, F/I/Dal/13, Absen, Dashboard, Pengumuman, About
          const navItems = [
            { id: 'laporan2', icon: ClipboardList, label: 'Kegiatan' },
            { id: 'laporan1', icon: FileText, label: 'F/I/Dal/13' },
            { id: 'absen', icon: CalendarDays, label: 'Absen' },
            { id: 'dashboard', icon: Home, label: 'Dashboard' },
            { id: 'pengumuman', icon: Bell, label: 'Pengumuman' },
            { id: 'about', icon: Info, label: 'Tentang' },
          ];

          if (user.isDev) {
            navItems.push({ id: 'dev', icon: Shield, label: 'Dev Panel' });
          }

          return (
            <div className="min-h-screen bg-gray-50 font-sans flex flex-col">
              {showPassModal && <ChangePasswordModal user={user} users={users} setUsers={setUsers} onClose={()=>setShowPassModal(false)} />}
              
              <header className="bg-white shadow-sm sticky top-0 z-50 print:hidden overflow-x-auto">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-16 min-w-[700px] sm:min-w-0">
                    <div className="flex items-center gap-3">
                      <img src="logo-spmd.png" className="w-8 h-8 object-contain hidden sm:block" alt="SPMD" onError={(e)=>{e.target.style.display='none'}}/>
                      <h1 className="text-xl font-bold text-sky-600 hidden lg:block">SPMD Report</h1>
                    </div>
                    
                    <nav className="flex space-x-1 overflow-x-auto pb-1 sm:pb-0 scrollbar-hide">
                      {navItems.map(item => {
                        const Icon = item.icon;
                        return (
                          <button key={item.id} onClick={() => setCurrentTab(item.id)}
                            className={`px-3 sm:px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-medium transition-colors whitespace-nowrap ${currentTab === item.id ? 'bg-sky-100 text-sky-700' : 'text-gray-600 hover:bg-gray-100'}`}
                          >
                            <Icon size={18} /> <span className="hidden md:inline">{item.label}</span>
                          </button>
                        );
                      })}
                    </nav>

                    <div className="flex items-center gap-4 pl-4">
                      <div className="text-right hidden sm:block">
                        <p className="text-sm font-bold text-gray-800 flex items-center gap-2 justify-end">
                          {user.username} {user.isDev && <Shield size={14} className="text-red-500"/>}
                        </p>
                        <p className="text-xs text-gray-500">Desa {user.desa}</p>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={()=>setShowPassModal(true)} className="p-2 text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-full transition" title="Ganti Sandi">
                          <Key size={18} />
                        </button>
                        <button onClick={onLogout} className="p-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-full transition" title="Logout">
                          <LogOut size={18} />
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

              <main className="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6 pb-24 md:pb-6 overflow-x-hidden">
                {children}
              </main>

              <footer className="bg-gray-800 text-white py-4 text-center text-sm print:hidden hidden md:block mt-auto">
                <p>spmdklu © 2026 - By semetonweb.store</p>
              </footer>

              {/* Mobile Bottom Navigation Bar */}
              <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white shadow-[0_-5px_15px_rgba(0,0,0,0.1)] z-50 rounded-t-2xl pb-safe print:hidden overflow-x-auto">
                <div className="flex justify-between items-center h-16 px-2 min-w-[320px]">
                  {navItems.map(item => {
                    const isActive = currentTab === item.id;
                    const Icon = item.icon;
                    return (
                      <button key={item.id} onClick={() => setCurrentTab(item.id)}
                        className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-all duration-300 px-1 ${isActive ? 'text-sky-500 transform -translate-y-1' : 'text-gray-400 hover:text-gray-600'}`}
                      >
                        <Icon size={isActive ? 22 : 18} className={isActive ? 'drop-shadow-md' : ''} />
                        <span className={`text-[9px] font-medium ${isActive ? 'opacity-100' : 'opacity-70'} whitespace-nowrap`}>{item.label}</span>

              </div>

        // --- PENGUMUMAN VIEW (Integrasi OneSignal) ---
        function PengumumanView() {
          const handleSubscribe = () => {
             // Cek jika OneSignal sudah dimuat oleh browser
             if (window.OneSignal) {
                 window.OneSignal.showSlidedownPrompt();
             } else {
                 alert("Sistem notifikasi sedang dimuat atau cek koneksi Anda.");
             }
          };

          return (
            <div className="animate-fade-in flex justify-center py-6 sm:py-10">
              <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border-t-4 border-sky-500 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-sky-50 rounded-full blur-3xl -z-10"></div>
                
                <div className="w-20 h-20 mx-auto bg-sky-100 rounded-full flex items-center justify-center text-sky-500 mb-6 shadow-sm animate-bounce">
                  <Bell size={40} />
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">Pusat Pengumuman SPMD</h2>
                <div className="w-16 h-1 bg-sky-500 mx-auto rounded-full mb-6"></div>
                
                <p className="text-gray-600 mb-8 leading-relaxed">
                  Dapatkan informasi, pengumuman, dan pembaruan terbaru langsung ke perangkat Anda dari BKKBN Kabupaten Lombok Utara. 
                  Pastikan Anda berlangganan notifikasi agar tidak tertinggal informasi penting.
                </p>

                <div className="bg-gray-50 rounded-2xl p-6 border border-gray-100 mb-8">
                   <h3 className="text-lg font-semibold text-gray-700 mb-2">Belum ada pengumuman baru</h3>
                   <p className="text-sm text-gray-500">Semua riwayat pengumuman akan tampil di sini di masa mendatang.</p>
                </div>

                <button 
                  onClick={handleSubscribe}
                  className="inline-flex items-center justify-center gap-3 w-full sm:w-auto bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 px-8 rounded-2xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1"
                >
                  <Bell size={20} />
                  Berlangganan Notifikasi
                </button>
              </div>
            </div>
          );
        }

        // --- DASHBOARD VIEW ---
        function DashboardView({ reports, setReports, currentUser }) {
          // ... (Kode DashboardView sama seperti sebelumnya) ...
          const [search, setSearch] = useState('');
          const [selectedMonth, setSelectedMonth] = useState('');

          const handleDelete = (id) => {
            if(window.confirm("Hapus laporan ini?")) {
              setReports(reports.filter(r => r.id !== id));
            }
          }

          const getMonthName = (m) => {
             if (!m) return '';
             if (typeof m === 'string' && m.startsWith('0')) return MONTH_NAMES[parseInt(m, 10) - 1] || m;
             if (!isNaN(m)) return MONTH_NAMES[parseInt(m, 10) - 1] || m;
             return m;
          };

          const filteredReports = reports.filter(r => {
            const matchSearch = r.name.toLowerCase().includes(search.toLowerCase()) || r.desa.toLowerCase().includes(search.toLowerCase());
            const matchMonth = selectedMonth === '' || getMonthName(r.month) === selectedMonth;
            return matchSearch && matchMonth;
          });

          const groupedByDesa = filteredReports.reduce((acc, curr) => {
            if(!acc[curr.desa]) acc[curr.desa] = [];
            acc[curr.desa].push(curr);
            return acc;
          }, {});

          const reportersThisMonth = selectedMonth ? 
             [...new Set(reports.filter(r => getMonthName(r.month) === selectedMonth).map(r => `${r.name} (${r.desa})`))] 
             : [];

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="bg-gradient-to-r from-sky-400 to-blue-500 rounded-3xl p-6 text-white shadow-lg flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                  <h2 className="text-2xl font-bold mb-2">Dashboard Rekapitulasi</h2>
                  <p className="opacity-90">Melihat riwayat laporan anggota SPMD berdasarkan desa.</p>
                </div>
                <div className="relative w-full md:w-64">
                   <Search className="absolute left-3 top-3 text-sky-200" size={18} />
                   <input type="text" placeholder="Cari Nama / Desa..." className="w-full pl-10 pr-4 py-2.5 bg-white/20 border border-white/30 rounded-xl text-white placeholder-sky-100 focus:outline-none focus:bg-white/30 transition" value={search} onChange={e=>setSearch(e.target.value)}/>
                </div>
              </div>

              {/* Rekap per Bulan Card */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-4 border-b pb-4">
                   <h3 className="font-bold text-gray-700">Daftar Pelapor Per Bulan</h3>
                   <select className="border border-gray-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-sky-400 font-medium text-gray-700" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
                      <option value="">-- Semua Bulan --</option>
                      {MONTH_NAMES.map(m => <option key={m} value={m}>{m}</option>)}
                   </select>
                </div>
                {selectedMonth ? (
                  reportersThisMonth.length > 0 ? (
                    <div className="flex flex-wrap gap-2">
                      {reportersThisMonth.map((name, i) => (
                        <span key={i} className="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold">{name}</span>
                      ))}
                    </div>
                  ) : <p className="text-sm text-gray-500 italic">Belum ada laporan di bulan ini.</p>
                ) : <p className="text-sm text-gray-500 italic">Pilih bulan di atas untuk melihat daftar anggota yang telah melapor.</p>}
              </div>

              {/* Grouped Table */}
              {Object.keys(groupedByDesa).length === 0 ? (
                <div className="text-center py-10 bg-white rounded-2xl border text-gray-500">Tidak ada data ditemukan.</div>
              ) : (
                Object.keys(groupedByDesa).sort().map(desa => (
                  <div key={desa} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                    <div className="p-4 border-b border-gray-100 bg-sky-50 flex justify-between items-center">
                      <h3 className="font-bold text-sky-800 flex items-center gap-2"><MapPin size={18}/> Desa {desa}</h3>
                      <span className="text-xs bg-sky-200 text-sky-700 px-2 py-1 rounded-md font-bold">{groupedByDesa[desa].length} Laporan</span>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead className="bg-gray-50 text-gray-500 border-b">
                          <tr>
                            <th className="px-4 py-3 font-medium w-32">Tanggal</th>
                            <th className="px-4 py-3 font-medium">Nama Anggota</th>
                            <th className="px-4 py-3 font-medium">Jenis</th>
                            <th className="px-4 py-3 font-medium min-w-[200px]">Deskripsi Kegiatan</th>
                            <th className="px-4 py-3 font-medium text-center">%</th>
                            {currentUser?.isDev && <th className="px-4 py-3 font-medium text-center">Aksi</th>}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {groupedByDesa[desa].map((row, i) => (
                            <tr key={i} className="hover:bg-gray-50 transition-colors">
                              <td className="px-4 py-3 text-gray-600">{row.date}</td>
                              <td className="px-4 py-3 font-semibold text-gray-800">{row.name}</td>
                              <td className="px-4 py-3"><span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">{row.type}</span></td>
                              <td className="px-4 py-3 text-gray-600 truncate max-w-xs" title={row.desc}>{row.desc || '-'}</td>
                              <td className="px-4 py-3 text-center font-bold text-green-600">{row.percent || '-'}</td>
                              {currentUser?.isDev && (
                                <td className="px-4 py-3 text-center">
                                  <button onClick={()=>handleDelete(row.id)} className="text-red-500 hover:bg-red-100 p-1.5 rounded"><Trash2 size={16}/></button>
                                </td>
                              )}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                ))
              )}
            </div>
          );
        }

        // --- DEV PANEL ---
        function DeveloperSettings({ users }) {
          return (
            <div className="animate-fade-in bg-white p-6 rounded-3xl shadow border-t-4 border-red-500">
               <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Shield className="text-red-500"/> Developer Panel - Data User</h2>
               <div className="overflow-x-auto">
                 <table className="w-full text-sm text-left border">
                   <thead className="bg-gray-100">
                     <tr><th className="p-3 border">Nama / Username</th><th className="p-3 border">Desa</th><th className="p-3 border text-red-600">Kata Sandi (Khusus Dev)</th></tr>
                   </thead>
                   <tbody>
                     {users.map(u => (
                       <tr key={u.id} className="border-b">
                         <td className="p-3 border font-medium">{u.username} {u.isDev && '(Developer)'}</td>
                         <td className="p-3 border">{u.desa}</td>
                         <td className="p-3 border font-mono font-bold">{u.password}</td>
                       </tr>
                     ))}
                   </tbody>
                 </table>
               </div>
            </div>
          )
        }

        // --- SHARED FORM CONTROLS (Updated with PDF & Edit capabilities) ---
        const FormControls = ({ onSave, onEdit, isSaved, exportType, fileName }) => {
          
          const handleDownloadPDF = () => {
             const element = document.getElementById('printable-area');
             const controls = document.getElementById('form-controls');
             
             // Setup untuk Export HD A4 Portrait
             const opt = {
                margin:       [10, 10, 15, 10], // top, left, bottom, right (mm)
                filename:     (fileName || 'Laporan_SPMD') + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
             };
             
             if (controls) controls.style.display = 'none';

             html2pdf().set(opt).from(element).save().then(() => {
                 if (controls) controls.style.display = 'flex';
             });
          };

          return (
            <div id="form-controls" className="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 print:hidden border-b pb-4 border-gray-200">
              
              {!isSaved ? (
                <div className="w-full flex justify-between items-center">
                   <p className="text-sm font-bold text-gray-500 flex items-center gap-2"><Edit size={16}/> Mode Edit</p>
                   <button onClick={onSave} className="flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white px-6 py-2.5 rounded-xl shadow-md transition font-medium">
                     <Eye size={18} /> Simpan & Preview
                   </button>
                </div>
              ) : (
                <div className="w-full flex flex-col sm:flex-row items-center justify-between gap-3 animate-fade-in">
                  <div className="flex items-center gap-2 text-sky-600 font-bold w-full sm:w-auto">
                    <Eye size={20} /> Mode Preview (Siap Unduh)
                  </div>
                  <div className="flex gap-3 w-full sm:w-auto">
                    <button onClick={onEdit} className="flex-1 sm:flex-none items-center justify-center flex gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-3 rounded-xl shadow-sm transition font-bold text-sm">
                      <Edit size={18} /> Edit Kembali
                    </button>
                    <button onClick={handleDownloadPDF} className="flex-1 sm:flex-none items-center justify-center flex gap-2 bg-sky-500 hover:bg-sky-600 text-white px-6 py-3 rounded-xl shadow-lg transition font-bold text-sm sm:text-base">
                      <Download size={20} /> Download PDF (A4)
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // Precise Signature Component
        const SignaturePad = ({ titleTop, namePlaceholder, isSaved }) => {
          const [image, setImage] = useState(null);

          const handleUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => setImage(reader.result);
              reader.readAsDataURL(file);
            }
          };

          return (
            <div className="flex flex-col items-center justify-center text-center page-break-inside-avoid min-w-[200px]">
              <p className="font-semibold text-[10px] sm:text-xs leading-tight mb-2 whitespace-pre-wrap">{titleTop}</p>
              <div className="h-16 w-full relative flex items-center justify-center my-1">
                 {image ? (
                   <div className="relative group flex items-center justify-center w-full h-full">
                      <img src={image} alt="TTD" className="max-h-16 max-w-full object-contain" />
                      {!isSaved && (
                        <button onClick={() => setImage(null)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition print:hidden z-20">
                          <Trash2 size={12} />
                        </button>
                      )}
                   </div>
                 ) : (
                    !isSaved && (
                      <label className="cursor-pointer text-blue-500 text-[10px] flex flex-col items-center justify-center w-24 h-12 border border-dashed border-blue-200 rounded print:hidden hover:bg-blue-50 transition">
                        <Upload size={14} /> <span className="mt-1">Upload TTD</span>
                        <input type="file" accept="image/*" className="hidden" onChange={handleUpload} />
                      </label>
                    )
                 )}
              </div>
              <div className="w-full flex justify-center mt-1">
                 <input type="text" placeholder={namePlaceholder || "(......................................)"} disabled={isSaved} className="w-full text-center focus:outline-none text-[10px] sm:text-xs font-bold bg-transparent disabled:text-black" />
              </div>
            </div>
          );
        }

        // --- F/I/DAL/13 EXACT MATCH DARI EXCEL/CSV ---
        function F1Dal13View({ user }) {
          return (
            <div className="animate-fade-in flex justify-center py-10">
              <div className="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border-t-4 border-sky-400 relative overflow-hidden">
                <div className="w-20 h-20 mx-auto bg-sky-100 rounded-full flex items-center justify-center text-sky-500 mb-6 shadow-sm">
                  <FileText size={40} />
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">Format Laporan F/I/Dal/13</h2>
                <div className="w-16 h-1 bg-sky-400 mx-auto rounded-full mb-6"></div>
                
                <p className="text-gray-600 mb-8 leading-relaxed">
                  Untuk menjaga kerapian format sesuai standar BKKBN, pengisian form F/I/Dal/13 kini dialihkan menggunakan file Microsoft Excel. Silakan unduh format resminya melalui tautan Google Drive di bawah ini.
                </p>

                <a 
                  href="https://docs.google.com/spreadsheets/d/1AlS5F1pzCx1bS5UUumtAOvWBQtu5o6Gt/edit?usp=drive_link&ouid=101925882132539477377&rtpof=true&sd=true" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="inline-flex items-center justify-center gap-3 w-full sm:w-auto bg-gradient-to-r from-sky-400 to-blue-500 hover:from-sky-500 hover:to-blue-600 text-white font-bold py-4 px-8 rounded-2xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1"
                >
                  <Download size={24} />
                  Download Format Excel F/I/Dal/13
                </a>
              </div>
            </div>
          );
        }

        // --- LAPORAN KEGIATAN SPMD (With PDF Export & Preview Mode) ---
        function KegiatanView({ user, addReport }) {
          const [rows, setRows] = useState([{ id: 1, date: '', desc: '', percent: '', img: null }]);
          const [isSaved, setIsSaved] = useState(false);

          const addRow = () => setRows([...rows, { id: Date.now(), date: '', desc: '', percent: '', img: null }]);
          const removeRow = (id) => setRows(rows.filter(r => r.id !== id));

          const handleImgUpload = (id, file) => {
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => setRows(rows.map(r => r.id === id ? { ...r, img: reader.result } : r));
              reader.readAsDataURL(file);
            }
          };

          const handleSave = () => {
             const firstRow = rows[0];
             const currentMonthName = MONTH_NAMES[new Date().getMonth()];
             addReport({ id: Date.now(), name: user.username, desa: user.desa, type: "Laporan Kegiatan", date: firstRow.date || new Date().toISOString().split('T')[0], desc: firstRow.desc || "Laporan Kegiatan SPMD", percent: firstRow.percent || "100%", month: currentMonthName });
             setIsSaved(true);
          }
          
          const handleEdit = () => {
             setIsSaved(false);
          }

          return (
            <div className="animate-fade-in portrait-page">
              <FormControls 
                  onSave={handleSave} 
                  onEdit={handleEdit}
                  isSaved={isSaved} 
                  exportType="pdf" 
                  fileName={`Kegiatan_SPMD_${user.username.replace(/\s+/g, '_')}`} 
              />
              
              <div id="printable-area" className={`bg-white p-6 sm:p-10 rounded-2xl shadow-sm border border-gray-100 print:shadow-none print:border-none print:p-0 mx-auto w-full max-w-[900px] text-black ${isSaved ? 'pointer-events-none' : ''}`}>
                <div className="text-center mb-10">
                  <h2 className="font-bold text-[18px] uppercase">LAPORAN KEGIATAN SARJANA PENGGERAK MEMBANGUN DESA (SPMD)</h2>
                  <h2 className="font-bold text-[16px] uppercase">KABUPATEN LOMBOK UTARA</h2>
                  <div className="flex justify-center items-center gap-2 mt-3 font-semibold text-sm">
                     <span>BULAN</span>
                     <input type="text" className="border-b border-black focus:outline-none text-center uppercase font-bold bg-transparent disabled:text-black" placeholder="JANUARI-FEBRUARI 2026" disabled={isSaved} />
                  </div>
                </div>

                <div className="mb-6 space-y-3 text-[13px] pointer-events-auto">
                  <div className="flex gap-4 items-center">
                      <span className="w-20 font-semibold">Nama</span>
                      <span>: <input type="text" className="border-b border-gray-400 focus:outline-none uppercase font-bold bg-transparent disabled:text-black disabled:border-transparent" defaultValue={user.username} disabled={isSaved} /></span>
                  </div>
                  <div className="flex flex-col sm:flex-row sm:gap-4 sm:items-center">
                      <div className="flex gap-4 items-center">
                          <span className="w-20 font-semibold">NIK</span>
                          <span>: <input type="text" className="border-b border-gray-400 focus:outline-none font-bold bg-transparent disabled:text-black disabled:border-transparent w-40" placeholder="Kosongkan..." disabled={isSaved} /></span>
                      </div>
                      <span className="text-red-500 text-[11px] italic ml-24 sm:ml-0 mt-1 sm:mt-0 font-medium">* Tulis manual setelah dicetak (Data Sensitif)</span>
                  </div>
                  <div className="flex gap-4 items-center">
                      <span className="w-20 font-semibold">Jabatan</span>
                      <span>: <input type="text" className="border-b border-gray-400 focus:outline-none w-64 font-bold bg-transparent disabled:text-black disabled:border-transparent" defaultValue="SPMD/PLKB Non PNS" disabled={isSaved} /></span>
                  </div>
                </div>

                <div className="overflow-x-auto w-full mb-4">
                  <table className="f1-table w-full">
                    <colgroup>
                        <col style={{width: '6%'}}/>
                        <col style={{width: '20%'}}/>
                        <col style={{width: '38%'}}/>
                        <col style={{width: '11%'}}/>
                        <col style={{width: '25%'}}/>
                        {!isSaved && <col style={{width: '5%'}} className="print:hidden"/>}
                    </colgroup>
                    <thead>
                      <tr className="bg-gray-100 print:bg-gray-100 text-center font-bold">
                        <th>No</th>
                        <th>Hari/tanggal</th>
                        <th>Uraian Kegiatan</th>
                        <th>Persentase</th>
                        <th>Dokumentasi</th>
                        {!isSaved && <th className="print:hidden border-none bg-transparent"></th>}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map((row, index) => (
                        <tr key={row.id}>
                          <td className="text-center align-top pt-3">{index + 1}</td>
                          <td className="align-top">
                            <textarea className="w-full min-h-[80px] resize-none focus:outline-none bg-transparent disabled:text-black" placeholder="Senin, 05 Januari 2026" disabled={isSaved}></textarea>
                          </td>
                          <td className="align-top">
                            <textarea className="w-full min-h-[80px] resize-none focus:outline-none bg-transparent disabled:text-black leading-relaxed" placeholder="Deskripsi kegiatan secara rinci..." disabled={isSaved}></textarea>
                          </td>
                          <td className="text-center align-middle">
                            <input type="text" className="w-full text-center focus:outline-none bg-transparent font-bold disabled:text-black" placeholder="100%" disabled={isSaved} />
                          </td>
                          <td className="text-center align-middle relative h-[100px] pointer-events-auto">
                             {row.img ? (
                               <div className="relative group flex justify-center w-full h-full items-center">
                                  <img src={row.img} alt="Doc" className="max-h-[90px] max-w-[90%] object-contain rounded border border-gray-200 p-1" />
                                  {!isSaved && (
                                    <button onClick={() => setRows(rows.map(r => r.id === row.id ? {...r, img: null} : r))} className="absolute top-0 right-0 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition print:hidden z-10 shadow">
                                      <Trash2 size={12} />
                                    </button>
                                  )}
                               </div>
                             ) : (
                                !isSaved ? (
                                  <label className="cursor-pointer text-gray-400 hover:text-sky-500 flex flex-col items-center justify-center w-full h-[90px] border border-dashed border-gray-300 rounded print:hidden bg-gray-50 hover:bg-sky-50 transition">
                                    <Upload size={20} /> <span className="text-[10px] mt-1 font-medium">Upload Foto</span>
                                    <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImgUpload(row.id, e.target.files[0])} />
                                  </label>
                                ) : (
                                  <div className="w-full h-[90px] flex items-center justify-center text-gray-300 text-xs italic">
                                    (Tidak ada foto)
                                  </div>
                                )
                             )}
                          </td>
                          {!isSaved && (
                            <td className="text-center align-middle print:hidden border-none bg-transparent pointer-events-auto pl-2">
                              <button onClick={() => removeRow(row.id)} className="text-red-500 hover:bg-red-50 p-2 rounded-lg transition shadow-sm border border-red-100"><Trash2 size={18} /></button>
                            </td>
                          )}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                {!isSaved && (
                  <div className="mb-12 print:hidden pointer-events-auto">
                     <button onClick={addRow} className="flex items-center gap-2 text-sky-600 bg-sky-50 px-4 py-2 rounded-xl hover:bg-sky-100 transition text-sm font-bold border border-sky-200 shadow-sm">
                       <Plus size={18} /> Tambah Kolom Kegiatan
                     </button>
                  </div>
                )}

                {/* Signature Right Column */}
                <div className="flex justify-end mt-16 w-full pointer-events-auto">
                    <SignaturePad titleTop="Pelaksana Kegiatan" namePlaceholder={`(${user.username.toUpperCase()})`} isSaved={isSaved} />
                </div>
              </div>
            </div>
          );
        }

        // --- GOOGLE DRIVE ABSENSI VIEW ---
        function AbsenView({ user }) {
          return (
            <div className="animate-fade-in flex justify-center py-10">
              <div className="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border-t-4 border-sky-400 relative overflow-hidden">
                <div className="w-20 h-20 mx-auto bg-sky-100 rounded-full flex items-center justify-center text-sky-500 mb-6 shadow-sm">
                  <CalendarDays size={40} />
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">Format Absensi Manual</h2>
                <div className="w-16 h-1 bg-sky-400 mx-auto rounded-full mb-6"></div>
                
                <p className="text-gray-600 mb-8 leading-relaxed">
                  Tabel absensi sekarang diisi secara tertulis. Silakan unduh format absen resmi Kabupaten Lombok Utara melalui tautan Google Drive di bawah ini, kemudian cetak dan isi secara manual.
                </p>

                <a 
                  href="https://drive.google.com/file/d/1hLfaDdAUe-hVwXkc-EhpPN-HnDA8LER7/view?usp=sharing" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="inline-flex items-center justify-center gap-3 w-full sm:w-auto bg-gradient-to-r from-sky-400 to-blue-500 hover:from-sky-500 hover:to-blue-600 text-white font-bold py-4 px-8 rounded-2xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1"
                >
                  <Download size={24} />
                  Download Format Absensi
                </a>
              </div>
            </div>
          );
        }

        // --- ABOUT VIEW ---
        function AboutView() {
          return (
            <div className="animate-fade-in flex justify-center py-10">
              <div className="bg-white p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border-t-4 border-sky-400 relative overflow-hidden">
                <div className="absolute -top-16 -right-16 w-32 h-32 bg-sky-50 rounded-full blur-2xl"></div>
                <div className="absolute -bottom-16 -left-16 w-32 h-32 bg-blue-50 rounded-full blur-2xl"></div>
                <div className="relative z-10">
                  <div className="w-20 h-20 mx-auto bg-gradient-to-tr from-sky-400 to-blue-500 rounded-full flex items-center justify-center text-white mb-6 shadow-lg transform hover:scale-110 transition duration-300">
                    <Info size={40} />
                  </div>
                  <h2 className="text-3xl font-bold text-gray-800 mb-2">Tentang SPMD Report</h2>
                  <div className="w-16 h-1 bg-sky-400 mx-auto rounded-full mb-6"></div>
                  <p className="text-gray-600 mb-8 leading-relaxed text-sm sm:text-base">
                    Aplikasi website ini dibuat dengan tujuan untuk mempermudah teman-teman SPMD (Sarjana Penggerak Membangun Desa) atau PLKB Non ASN di daerah Kabupaten Lombok Utara dalam membuat laporan dan mengisi absensi kapanpun dan dimanapun berada.
                  </p>
                  <div className="bg-sky-50 rounded-2xl p-6 text-left shadow-inner mb-8 border border-sky-100">
                     <h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2"><User size={18} className="text-sky-500"/> Informasi Pengembang</h3>
                     <ul className="space-y-3 text-sm text-gray-600">
                       <li className="flex items-center gap-3"><span className="font-semibold w-24">Pembuat</span>: Ahmad Yani</li>
                       <li className="flex items-center gap-3"><span className="font-semibold w-24">Email</span>: <a href="mailto:ahmadstimik15@gmail.com" className="text-sky-500 hover:underline">ahmadstimik15@gmail.com</a></li>
                       <li className="flex items-center gap-3"><span className="font-semibold w-24">WhatsApp</span>: <a href="https://wa.me/6285956684081" className="text-sky-500 hover:underline">085956684081</a></li>
                     </ul>
                  </div>
                  <p className="text-sm text-gray-500 font-medium">
                    Tertarik membuat website? Kunjungi: <br/>
                    <a href="https://semetonweb.store" target="_blank" rel="noopener noreferrer" className="text-sky-600 font-bold hover:underline text-lg mt-1 inline-block">semetonweb.store</a>
                  </p>
                </div>
              </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
