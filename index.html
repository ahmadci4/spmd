<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPMD Report - Kabupaten Lombok Utara</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Config for Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sky: { 50: '#f0f9ff', 100: '#e0f2fe', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7' }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for Printing & Animations -->
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }

        /* Futuristic Login Animations */
        @keyframes pulseRing {
            0% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 30px rgba(14, 165, 233, 0); }
            100% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }
        .animate-pulse-ring { animation: pulseRing 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }

        @keyframes scanline {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }
        .animate-scanline {
            position: absolute; left: 0; right: 0; height: 3px;
            background: #38bdf8; box-shadow: 0 0 15px #38bdf8, 0 0 30px #0ea5e9;
            animation: scanline 1.8s linear infinite; z-index: 10;
        }

        /* Menyembunyikan scrollbar untuk navigasi agar lebih bersih di mobile */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Print Specific Styles - HD Vector Quality */
        @media print {
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; }
            #root { padding: 0; margin: 0; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print\:p-0 { padding: 0 !important; }
            
            /* Menyembunyikan semua elemen kecuali area laporan */
            body * { visibility: hidden; }
            #printable-area, #printable-area * { visibility: visible; }
            #printable-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; }

            .page-break { page-break-after: always; }
            @page { margin: 15mm; size: A4 portrait; }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .f1-table { border-collapse: collapse; width: 100%; }
        .f1-table th, .f1-table td { border: 1px solid black; font-size: 13px; line-height: 1.5; padding: 8px 10px; vertical-align: top; }
        .f1-table th { font-weight: bold; text-align: center; background-color: #e5e7eb; vertical-align: middle; }
        .f1-table tr { page-break-inside: avoid; }
        
        @media print { .f1-table th { background-color: #f3f4f6 !important; } }
    </style>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

          safari_web_id: "web.onesignal.auto.xxxxxx",
          notifyButton: { enable: true },
        });
      });
    </script>

          MessageCircle: ({ size = 24, className = "" }) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>,

        const { Home, FileText, ClipboardList, CalendarDays, Info, LogOut, Plus, Trash2, Download, Upload, User, MapPin, Key, Search, Shield, CheckCircle, Bell, Edit, Image, Link, Instagram, MessageCircle, Globe } = Icons;

        // --- LOCAL STORAGE HOOK ---
        function useLocalStorage(key, initialValue) {
          const [storedValue, setStoredValue] = useState(() => {
            try {
              const item = window.localStorage.getItem(key);
              return item ? JSON.parse(item) : initialValue;
            } catch (error) {
              console.log(error);
              return initialValue;
            }
          });
          const setValue = (value) => {
            try {
              const valueToStore = value instanceof Function ? value(storedValue) : value;
              setStoredValue(valueToStore);
              window.localStorage.setItem(key, JSON.stringify(valueToStore));
            } catch (error) {
              console.log(error);
            }
          };
          return [storedValue, setValue];
        }

        // --- APP DATA INITIALIZATION ---
        const initialUsers = [
          { id: 1, username: 'Ahmad Yani', desa: 'Karang Bajo', password: 'developer@004', isDev: true },
          { id: 2, username: 'Ahmad', desa: 'Karang Bajo', password: '123', isDev: false }
        ];

        const initialReports = [
           { id: 1, name: "Ahmad", desa: "Karang Bajo", type: "Laporan Kegiatan", date: "2026-01-15", desc: "Posyandu Keluarga Lansia", percent: "100%", status: "Selesai", month: "Januari" },
           { id: 2, name: "Budi", desa: "Bayan", type: "F/I/Dal/13", date: "2026-02-05", desc: "Laporan Dal Bulanan", percent: "100%", status: "Selesai", month: "Februari" }
        ];

        // --- MAIN APP COMPONENT ---
        function App() {
          const [users, setUsers] = useLocalStorage('spmd_users', initialUsers);
          const [reports, setReports] = useLocalStorage('spmd_reports', initialReports);
          
          const [isLoggedIn, setIsLoggedIn] = useState(false);
          const [currentUser, setCurrentUser] = useState(null);
          const [currentTab, setCurrentTab] = useState('laporan2');

          const handleLogin = (user) => {
            setCurrentUser(user);
            setIsLoggedIn(true);
          };

          const handleLogout = () => {
            setIsLoggedIn(false);
            setCurrentUser(null);
          };

          const addReport = (newReport) => {
            setReports([newReport, ...reports]);
          };

          if (!isLoggedIn) {
            return <LoginScreen onLogin={handleLogin} users={users} setUsers={setUsers} />;
          }

          return (
            <MainLayout user={currentUser} onLogout={handleLogout} currentTab={currentTab} setCurrentTab={setCurrentTab} users={users} setUsers={setUsers}>
              {currentTab === 'laporan2' && <KegiatanView user={currentUser} addReport={addReport} />}
              {currentTab === 'laporan1' && <F1Dal13View user={currentUser} />}
              {currentTab === 'absen' && <AbsenView user={currentUser} />}
              {currentTab === 'dashboard' && <DashboardView reports={reports} setReports={setReports} currentUser={currentUser} />}
              {currentTab === 'pengumuman' && <PengumumanView />}
              {currentTab === 'about' && <AboutView />}
              {currentTab === 'dev' && currentUser?.isDev && <DeveloperSettings users={users} />}
            </MainLayout>
          );
        }

        // --- LOGIN SCREEN ---
        function LoginScreen({ onLogin, users, setUsers }) {
          const [isRegistering, setIsRegistering] = useState(false);
          const [username, setUsername] = useState('');
          const [desa, setDesa] = useState('');
          const [password, setPassword] = useState('');
          const [showSplash, setShowSplash] = useState(false);

          const handleSubmit = (e) => {
            e.preventDefault();
            if (isRegistering) {
              if (users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
                alert("Username sudah terdaftar! Gunakan nama lain.");
                return;
              }
              const newUser = { id: Date.now(), username, desa, password, isDev: false };
              setUsers([...users, newUser]);
              alert("Akun berhasil dibuat! Silakan masuk.");
              setIsRegistering(false);
              setPassword('');
            } else {
              const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
              if (user) {
                setShowSplash(true);
                setTimeout(() => {
                   onLogin(user);
                }, 2800);
              } else {
                alert("Username atau Sandi salah!");
              }
            }
          };

          if (showSplash) {
             return (
               <div className="fixed inset-0 bg-gray-900 flex flex-col items-center justify-center z-[100] font-mono text-sky-400 overflow-hidden">
                 <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-sky-900/40 via-gray-900 to-gray-900"></div>
                 <div className="relative mb-10 z-10 flex items-center justify-center">
                    <div className="absolute inset-0 bg-sky-500 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                    <div className="relative w-40 h-40 bg-gray-900 rounded-full animate-pulse-ring flex items-center justify-center overflow-hidden border-2 border-sky-500 shadow-[0_0_30px_rgba(56,189,248,0.5)]">
                       <img src="logo-spmd.png" alt="Logo SPMD" className="w-24 h-24 object-contain z-10 bg-white rounded-full p-1" onError={(e)=>{e.target.style.display='none'}}/>
                       <div className="animate-scanline"></div>
                    </div>
                 </div>
                 <div className="z-10 text-center">
                    <div className="flex items-center justify-center gap-2 mb-2">
                       <CheckCircle className="text-green-400" size={24} />
                       <h2 className="text-2xl font-bold tracking-[0.2em] text-white">OTENTIKASI SUKSES</h2>
                    </div>
                    <p className="text-sm text-sky-300/80 animate-pulse tracking-widest">MEMUAT MODUL SPMD REPORT...</p>
                 </div>
               </div>
             );
          }

          return (
            <div className="min-h-screen bg-gradient-to-br from-sky-100 to-blue-200 flex items-center justify-center p-4 font-sans">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
                <div className="bg-sky-500 p-6 flex justify-between items-center text-white">
                  <img src="logo-spmd.png" alt="Logo SPMD" className="w-12 h-12 object-contain bg-white rounded-full p-1" onError={(e)=>{e.target.style.display='none'}} />
                  <h1 className="text-2xl font-bold tracking-wider text-center flex-1">SPMD Report</h1>
                  <img src="logo-bkkbn.png" alt="Logo BKKBN" className="w-12 h-12 object-contain bg-white rounded-full p-1" onError={(e)=>{e.target.style.display='none'}} />
                </div>
                
                <form onSubmit={handleSubmit} className="p-8 space-y-6">
                  <div className="text-center mb-6">
                    <h2 className="text-gray-700 text-lg font-medium">{isRegistering ? 'Daftar Akun Baru' : 'Selamat Datang Semeton!'}</h2>
                    <p className="text-gray-400 text-sm">{isRegistering ? 'Lengkapi form di bawah' : 'Silakan masuk ke akun Anda'}</p>
                  </div>
                  <div className="relative">
                    <User className="absolute left-3 top-3 text-gray-400" size={20} />
                    <input type="text" placeholder="Username / Nama" required className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400 transition" value={username} onChange={e => setUsername(e.target.value)} />
                  </div>
                  {isRegistering && (
                    <div className="relative animate-fade-in">
                      <MapPin className="absolute left-3 top-3 text-gray-400" size={20} />
                      <input type="text" placeholder="Asal Desa" required className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400 transition" value={desa} onChange={e => setDesa(e.target.value)} />
                    </div>
                  )}
                  <div className="relative">
                    <Key className="absolute left-3 top-3 text-gray-400" size={20} />
                    <input type="password" placeholder="Kata Sandi" required className="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400 transition" value={password} onChange={e => setPassword(e.target.value)} />
                  </div>
                  <button type="submit" className="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1">
                    {isRegistering ? 'Daftar Sekarang' : 'Masuk'}
                  </button>
                  <div className="text-center mt-4">
                     <button type="button" onClick={() => setIsRegistering(!isRegistering)} className="text-sm text-sky-600 hover:underline font-medium">
                       {isRegistering ? 'Sudah punya akun? Masuk di sini' : 'Belum punya akun? Daftar di sini'}
                     </button>
                  </div>
                </form>
                <div className="text-center pb-6 text-xs text-gray-400">
                  Program dari BKKBN Kabupaten Lombok Utara
                </div>
              </div>
            </div>
          );
        }

        // --- GANTI SANDI MODAL ---
        function ChangePasswordModal({ user, users, setUsers, onClose }) {
          const [oldPass, setOldPass] = useState('');
          const [newPass, setNewPass] = useState('');

          const handleSave = () => {
            if (user.password !== oldPass) return alert('Sandi lama salah!');
            if (newPass.length < 3) return alert('Sandi baru terlalu pendek!');
            
            const updatedUsers = users.map(u => u.id === user.id ? { ...u, password: newPass } : u);
            setUsers(updatedUsers);
            alert('Sandi berhasil diubah! Silakan login kembali dengan sandi baru jika diperlukan.');
            user.password = newPass;
            onClose();
          };

          return (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100] px-4">
              <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm animate-fade-in">
                <h3 className="text-lg font-bold text-gray-800 mb-4">Ganti Kata Sandi</h3>
                <input type="password" placeholder="Sandi Lama" className="w-full mb-3 p-3 border rounded-xl" value={oldPass} onChange={e=>setOldPass(e.target.value)} />
                <input type="password" placeholder="Sandi Baru" className="w-full mb-4 p-3 border rounded-xl" value={newPass} onChange={e=>setNewPass(e.target.value)} />
                <div className="flex justify-end gap-2">
                  <button onClick={onClose} className="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg">Batal</button>
                  <button onClick={handleSave} className="px-4 py-2 bg-sky-500 text-white rounded-lg font-bold">Simpan</button>
                </div>
              </div>
            </div>
          );
        }

        // --- MAIN LAYOUT (Navbar disatukan di bawah semua) ---
        function MainLayout({ children, user, onLogout, currentTab, setCurrentTab, users, setUsers }) {
          const [showPassModal, setShowPassModal] = useState(false);

          const navItems = [
            { id: 'laporan2', icon: ClipboardList, label: 'Kegiatan' },
            { id: 'laporan1', icon: FileText, label: 'F/I/Dal/13' },
            { id: 'absen', icon: CalendarDays, label: 'Absen' },
            { id: 'dashboard', icon: Home, label: 'Dashboard' },
            { id: 'pengumuman', icon: Bell, label: 'Pengumuman' },
            { id: 'about', icon: Info, label: 'Tentang' },
          ];

          if (user.isDev) navItems.push({ id: 'dev', icon: Shield, label: 'Dev Panel' });

          return (
            <div className="min-h-screen bg-gray-50 font-sans flex flex-col">
              {showPassModal && <ChangePasswordModal user={user} users={users} setUsers={setUsers} onClose={()=>setShowPassModal(false)} />}
              
              {/* Header Atas Bersih - Hanya Logo & Profil */}
              <header className="bg-white shadow-sm sticky top-0 z-40 print:hidden">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex justify-between items-center h-16">
                    <div className="flex items-center gap-3">
                      <img src="logo-spmd.png" className="w-8 h-8 object-contain" alt="SPMD" onError={(e)=>{e.target.style.display='none'}}/>
                      <h1 className="text-xl font-bold text-sky-600">SPMD KLU Report</h1>
                    </div>
                    
                    <div className="flex items-center gap-4">
                      <div className="text-right hidden sm:block">
                        <p className="text-sm font-bold text-gray-800 flex items-center gap-2 justify-end">
                          {user.username} {user.isDev && <Shield size={14} className="text-red-500"/>}
                        </p>
                        <p className="text-xs text-gray-500">Desa {user.desa}</p>
                      </div>
                      <div className="flex gap-2">
                        <button onClick={()=>setShowPassModal(true)} className="p-2 text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-full transition" title="Ganti Sandi">
                          <Key size={18} />
                        </button>
                        <button onClick={onLogout} className="p-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-full transition" title="Logout">
                          <LogOut size={18} />
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </header>

              <main className="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6 pb-24 overflow-x-hidden">
                {children}
              </main>

              {/* Bottom Navigation Global (Mobile & Desktop) */}
              <div className="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-[100] rounded-t-2xl print:hidden border-t border-gray-100 pointer-events-auto">
                <div className="max-w-4xl mx-auto flex items-center h-[70px] px-2 overflow-x-auto no-scrollbar scroll-smooth">
                  {navItems.map(item => {
                    const isActive = currentTab === item.id;
                    const Icon = item.icon;
                    return (
                      <button key={item.id} onClick={() => setCurrentTab(item.id)}
                        className={`min-w-[70px] flex-1 flex flex-col items-center justify-center h-full space-y-1 transition-all duration-300 px-1 ${isActive ? 'text-sky-500 transform -translate-y-1' : 'text-gray-400 hover:text-sky-500'}`}
                      >
                        <Icon size={isActive ? 22 : 18} className={isActive ? 'drop-shadow-md' : ''} />
                        <span className={`text-[10px] sm:text-xs font-bold ${isActive ? 'opacity-100' : 'opacity-70'} whitespace-nowrap`}>{item.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        // --- PENGUMUMAN VIEW ---
        function PengumumanView() {
          const handleSubscribe = () => {
             if (window.OneSignal) {
                 window.OneSignal.showSlidedownPrompt();
             } else {
                 alert("Sistem notifikasi sedang dimuat atau cek koneksi Anda.");
             }
          };

          return (
            <div className="animate-fade-in flex justify-center py-6 sm:py-10">
              <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border-t-4 border-sky-500 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-sky-50 rounded-full blur-3xl -z-10"></div>
                
                <div className="w-20 h-20 mx-auto bg-sky-100 rounded-full flex items-center justify-center text-sky-500 mb-6 shadow-sm animate-bounce">
                  <Bell size={40} />
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">Pusat Pengumuman SPMD</h2>
                <div className="w-16 h-1 bg-sky-500 mx-auto rounded-full mb-6"></div>
                
                <p className="text-gray-600 mb-8 leading-relaxed">
                  Dapatkan informasi, pengumuman, dan pembaruan terbaru langsung ke perangkat Anda dari BKKBN Kabupaten Lombok Utara. 
                  Pastikan Anda berlangganan notifikasi agar tidak tertinggal informasi penting.
                </p>

                <div className="bg-gray-50 rounded-2xl p-6 border border-gray-100 mb-8">
                   <h3 className="text-lg font-semibold text-gray-700 mb-2">Belum ada pengumuman baru</h3>
                   <p className="text-sm text-gray-500">Semua riwayat pengumuman resmi akan tampil di sini.</p>
                </div>

                <button 
                  onClick={handleSubscribe}
                  className="inline-flex items-center justify-center gap-3 w-full sm:w-auto bg-sky-500 hover:bg-sky-600 text-white font-bold py-3.5 px-6 rounded-2xl shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1"
                >
                  <Bell size={20} />
                  Tekan untuk mendapatkan alarm agar tidak lupa membuat laporan di akhir bulan
                </button>
              </div>
            </div>
          );
        }

        // --- DASHBOARD VIEW ---
        function DashboardView({ reports, setReports, currentUser }) {
          const [search, setSearch] = useState('');
          const [selectedMonth, setSelectedMonth] = useState('');

          const handleDelete = (id) => {
            if(window.confirm("Hapus laporan ini?")) {
              setReports(reports.filter(r => r.id !== id));
            }
          }

          const getMonthName = (m) => {
             if (!m) return '';
             if (typeof m === 'string' && m.startsWith('0')) return MONTH_NAMES[parseInt(m, 10) - 1] || m;
             if (!isNaN(m)) return MONTH_NAMES[parseInt(m, 10) - 1] || m;
             return m;
          };

          const filteredReports = reports.filter(r => {
            const matchSearch = r.name.toLowerCase().includes(search.toLowerCase()) || r.desa.toLowerCase().includes(search.toLowerCase());
            const matchMonth = selectedMonth === '' || getMonthName(r.month) === selectedMonth;
            return matchSearch && matchMonth;
          });

          const groupedByDesa = filteredReports.reduce((acc, curr) => {
            if(!acc[curr.desa]) acc[curr.desa] = [];
            acc[curr.desa].push(curr);
            return acc;
          }, {});

          const reportersThisMonth = selectedMonth ? 
             [...new Set(reports.filter(r => getMonthName(r.month) === selectedMonth).map(r => `${r.name} (${r.desa})`))] 
             : [];

          return (
            <div className="space-y-6 animate-fade-in">
              <div className="bg-gradient-to-r from-sky-400 to-blue-500 rounded-3xl p-6 text-white shadow-lg flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                  <h2 className="text-2xl font-bold mb-2">Dashboard Rekapitulasi</h2>
                  <p className="opacity-90">Melihat riwayat laporan anggota SPMD berdasarkan desa.</p>
                </div>
                <div className="relative w-full md:w-64">
                   <Search className="absolute left-3 top-3 text-sky-200" size={18} />
                   <input type="text" placeholder="Cari Nama / Desa..." className="w-full pl-10 pr-4 py-2.5 bg-white/20 border border-white/30 rounded-xl text-white placeholder-sky-100 focus:outline-none focus:bg-white/30 transition" value={search} onChange={e=>setSearch(e.target.value)}/>
                </div>
              </div>

              {/* Rekap per Bulan Card */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
                <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-4 border-b border-gray-100 pb-4">
                   <h3 className="font-bold text-gray-700">Daftar Anggota Yang Sudah Mengisi Laporan Bulan Ini</h3>
                   <select className="border border-gray-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-sky-400 font-medium text-gray-700 bg-white" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
                      <option value="">-- Pilih Bulan --</option>
                      {MONTH_NAMES.map(m => <option key={m} value={m}>{m}</option>)}
                   </select>
                </div>
                {selectedMonth ? (
                  reportersThisMonth.length > 0 ? (
                    <div className="flex flex-wrap gap-2">
                      {reportersThisMonth.map((name, i) => (
                        <span key={i} className="bg-sky-100 text-sky-700 px-4 py-1.5 rounded-full text-sm font-bold border border-sky-200 shadow-sm">{name}</span>
                      ))}
                    </div>
                  ) : <p className="text-sm text-red-500 font-medium bg-red-50 p-3 rounded-lg border border-red-100">Belum ada anggota yang mengirim laporan di bulan ini.</p>
                ) : <p className="text-sm text-gray-500 italic bg-gray-50 p-3 rounded-lg border">Pilih bulan di atas untuk melihat daftar anggota yang telah melapor.</p>}
              </div>

              {/* Grouped Table */}
              {Object.keys(groupedByDesa).length === 0 ? (
                <div className="text-center py-10 bg-white rounded-2xl border text-gray-500 font-medium">Tidak ada data ditemukan.</div>
              ) : (
                Object.keys(groupedByDesa).sort().map(desa => (
                  <div key={desa} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                    <div className="p-4 border-b border-gray-100 bg-sky-50 flex justify-between items-center">
                      <h3 className="font-bold text-sky-800 flex items-center gap-2"><MapPin size={18}/> Desa {desa}</h3>
                      <span className="text-xs bg-sky-200 text-sky-700 px-2 py-1 rounded-md font-bold">{groupedByDesa[desa].length} Laporan</span>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead className="bg-gray-50 text-gray-500 border-b">
                          <tr>
                            <th className="px-4 py-3 font-medium w-32">Tanggal</th>
                            <th className="px-4 py-3 font-medium">Nama Anggota</th>
                            <th className="px-4 py-3 font-medium">Jenis</th>
                            <th className="px-4 py-3 font-medium min-w-[200px]">Deskripsi Kegiatan</th>
                            <th className="px-4 py-3 font-medium text-center">%</th>
                            {currentUser?.isDev && <th className="px-4 py-3 font-medium text-center">Aksi</th>}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {groupedByDesa[desa].map((row, i) => (
                            <tr key={i} className="hover:bg-gray-50 transition-colors">
                              <td className="px-4 py-3 text-gray-600">{row.date}</td>
                              <td className="px-4 py-3 font-semibold text-gray-800">{row.name}</td>
                              <td className="px-4 py-3"><span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold">{row.type}</span></td>
                              <td className="px-4 py-3 text-gray-600 truncate max-w-xs" title={row.desc}>{row.desc || '-'}</td>
                              <td className="px-4 py-3 text-center font-bold text-green-600">{row.percent || '-'}</td>
                              {currentUser?.isDev && (
                                <td className="px-4 py-3 text-center">
                                  <button onClick={()=>handleDelete(row.id)} className="text-red-500 hover:bg-red-100 p-1.5 rounded"><Trash2 size={16}/></button>
                                </td>
                              )}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                ))
              )}
            </div>
          );
        }

        // --- DEV PANEL ---
        function DeveloperSettings({ users }) {
          return (
            <div className="animate-fade-in bg-white p-6 rounded-3xl shadow border-t-4 border-red-500">
               <h2 className="text-xl font-bold mb-4 flex items-center gap-2"><Shield className="text-red-500"/> Developer Panel - Data User</h2>
               <div className="overflow-x-auto">
                 <table className="w-full text-sm text-left border">
                   <thead className="bg-gray-100">
                     <tr><th className="p-3 border">Nama / Username</th><th className="p-3 border">Desa</th><th className="p-3 border text-red-600">Kata Sandi (Khusus Dev)</th></tr>
                   </thead>
                   <tbody>
                     {users.map(u => (
                       <tr key={u.id} className="border-b">
                         <td className="p-3 border font-medium">{u.username} {u.isDev && '(Developer)'}</td>
                         <td className="p-3 border">{u.desa}</td>
                         <td className="p-3 border font-mono font-bold">{u.password}</td>
                       </tr>
                     ))}
                   </tbody>
                 </table>
               </div>
            </div>
          )
        }

        // --- Precise Signature Component ---
        const SignaturePad = ({ titleTop, namePlaceholder, isPreview }) => {
          const [image, setImage] = useState(null);

          const handleUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => setImage(reader.result);
              reader.readAsDataURL(file);
            }
          };

          return (
            <div className="flex flex-col items-center justify-center text-center page-break-inside-avoid min-w-[200px] print:text-black">
              <p className="font-semibold text-sm leading-tight mb-2">{titleTop}</p>
              <div className="h-20 w-full relative flex items-center justify-center my-2">
                 {image ? (
                   <div className="relative group flex items-center justify-center w-full h-full">
                      <img src={image} alt="TTD" className="max-h-20 max-w-full object-contain" />
                      {!isPreview && (
                        <button onClick={() => setImage(null)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition print:hidden z-20 shadow">
                          <Trash2 size={12} />
                        </button>
                      )}
                   </div>
                 ) : (
                    !isPreview ? (
                      <label className="cursor-pointer text-sky-500 flex flex-col items-center justify-center w-32 h-16 border-2 border-dashed border-sky-200 rounded-xl hover:bg-sky-50 transition">
                        <Upload size={18} /> <span className="text-[10px] mt-1 font-bold">Upload TTD</span>
                        <input type="file" accept="image/*" className="hidden" onChange={handleUpload} />
                      </label>
                    ) : (
                      <div className="h-16 w-full"></div> // Spasi kosong untuk ttd basah saat dicetak
                    )
                 )}
              </div>
              <div className="w-full flex justify-center mt-1">
                 {isPreview ? (
                    <div className="font-bold text-sm border-b border-black inline-block px-4 pb-0.5">{namePlaceholder.replace(/[()]/g, '')}</div>
                 ) : (
                    <input type="text" placeholder={namePlaceholder} className="w-full text-center focus:outline-none text-sm font-bold bg-gray-50 border-b border-gray-300 px-2 py-1 rounded-t" />
                 )}
              </div>
            </div>
          );
        }

        // --- LAPORAN KEGIATAN SPMD (RESPONSIVE FORM -> TABLE FLOW) ---
        function KegiatanView({ user, addReport }) {
          const [mode, setMode] = useState('form'); // 'form' atau 'preview'
          const [monthPeriod, setMonthPeriod] = useState('');
          const [rows, setRows] = useState([{ id: 1, date: '', desc: '', percent: '100%', img: null }]);
          const [isGenerating, setIsGenerating] = useState(false);

          const addRow = () => setRows([...rows, { id: Date.now(), date: '', desc: '', percent: '100%', img: null }]);
          const removeRow = (id) => setRows(rows.filter(r => r.id !== id));

          const updateRow = (id, field, value) => {
              setRows(rows.map(r => r.id === id ? { ...r, [field]: value } : r));
          }

          const handleImgUpload = (id, file) => {
            if (file) {
              const reader = new FileReader();
              reader.onloadend = () => updateRow(id, 'img', reader.result);
              reader.readAsDataURL(file);
            }
          };

          const handleGenerate = () => {
             const firstRow = rows[0];
             const currentMonthName = MONTH_NAMES[new Date().getMonth()];
             addReport({ id: Date.now(), name: user.username, desa: user.desa, type: "Laporan Kegiatan", date: firstRow.date || new Date().toISOString().split('T')[0], desc: firstRow.desc || "Laporan Kegiatan SPMD", percent: firstRow.percent || "100%", month: currentMonthName });
             setMode('preview');
          };
          
          const handleDownloadPDF = async () => {
             setIsGenerating(true);
             const element = document.getElementById('printable-area');
             
             // Amankan original style
             const originalWidth = element.style.width;
             const originalMaxWidth = element.style.maxWidth;
             const originalMargin = element.style.margin;
             
             // Paksa tampilan lebar desktop (800px) saat dirender ke PDF agar tabel tidak gepeng di layar HP kecil
             element.style.width = '800px';
             element.style.maxWidth = '800px';
             element.style.margin = '0 auto';

             const opt = {
                margin:       [10, 10, 15, 10], // Margin atas, kiri, bawah, kanan (mm)
                filename:     `Laporan_Kegiatan_${user.username.replace(/\s+/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                // Scale 2 sangat aman untuk HP (tidak over limit RAM seperti scale 4), namun cukup HD untuk tulisan vektor
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
             };
             
             try {
                 await html2pdf().set(opt).from(element).save();
             } catch (error) {
                 console.error("Gagal export PDF:", error);
                 alert("Gagal mengunduh PDF. Pastikan memori HP cukup atau kurangi ukuran/jumlah foto.");
             } finally {
                 // Kembalikan style seperti semula
                 element.style.width = originalWidth;
                 element.style.maxWidth = originalMaxWidth;
                 element.style.margin = originalMargin;
                 setIsGenerating(false);
             }
          };

          if (mode === 'form') {
              return (
                  <div className="animate-fade-in max-w-3xl mx-auto pb-10">
                      <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                          <div className="flex items-center gap-3 mb-6 border-b pb-4">
                              <div className="bg-sky-100 p-3 rounded-2xl text-sky-500"><ClipboardList size={24}/></div>
                              <div>
                                  <h2 className="text-xl font-bold text-gray-800">Buat Laporan Kegiatan Baru</h2>
                                  <p className="text-sm text-gray-500">Isi form di bawah, sistem akan menyusunnya ke dalam tabel format BKKBN.</p>
                              </div>
                          </div>

                          <div className="mb-6">
                              <label className="block text-sm font-bold text-gray-700 mb-2">Bulan & Tahun Laporan</label>
                              <input type="text" value={monthPeriod} onChange={e=>setMonthPeriod(e.target.value)} placeholder="Contoh: JANUARI - FEBRUARI 2026" className="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-sky-400 focus:outline-none uppercase font-semibold transition" />
                          </div>

                          <div className="space-y-6">
                              {rows.map((row, index) => (
                                  <div key={row.id} className="bg-gray-50 p-5 rounded-3xl border border-gray-200 relative">
                                      <div className="flex justify-between items-center mb-4">
                                          <h3 className="font-bold text-sky-600 bg-sky-100 px-3 py-1 rounded-lg text-sm">Kegiatan {index + 1}</h3>
                                          {rows.length > 1 && (
                                              <button onClick={()=>removeRow(row.id)} className="text-red-500 bg-red-100 p-2 rounded-xl hover:bg-red-200 transition"><Trash2 size={16}/></button>
                                          )}
                                      </div>
                                      
                                      <div className="space-y-4">
                                          <div>
                                              <label className="block text-xs font-bold text-gray-600 mb-1">Hari/Tanggal</label>
                                              <input type="text" value={row.date} onChange={e=>updateRow(row.id, 'date', e.target.value)} placeholder="Senin, 05 Januari 2026" className="w-full p-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 outline-none" />
                                          </div>
                                          <div>
                                              <label className="block text-xs font-bold text-gray-600 mb-1">Uraian Kegiatan</label>
                                              <textarea value={row.desc} onChange={e=>updateRow(row.id, 'desc', e.target.value)} placeholder="Tuliskan deskripsi lengkap kegiatan..." className="w-full p-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 outline-none min-h-[100px]"></textarea>
                                          </div>
                                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                              <div>
                                                  <label className="block text-xs font-bold text-gray-600 mb-1">Persentase</label>
                                                  <input type="text" value={row.percent} onChange={e=>updateRow(row.id, 'percent', e.target.value)} placeholder="100%" className="w-full p-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-sky-400 outline-none" />
                                              </div>
                                              <div>
                                                  <label className="block text-xs font-bold text-gray-600 mb-1">Dokumentasi (Foto)</label>
                                                  <div className="flex flex-col gap-2">
                                                      <label className="flex items-center justify-center gap-2 w-full p-3 bg-white border border-dashed border-sky-300 text-sky-600 font-bold rounded-xl cursor-pointer hover:bg-sky-50 transition">
                                                          <Image size={18} /> Upload Foto dari HP/PC
                                                          <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImgUpload(row.id, e.target.files[0])} />
                                                      </label>
                                                      <div className="relative">
                                                          <Link className="absolute left-3 top-3 text-gray-400" size={16} />
                                                          <input type="text" placeholder="Atau Paste Alamat Link Gambar..." value={row.img && row.img.startsWith('http') ? row.img : ''} onChange={e => updateRow(row.id, 'img', e.target.value)} className="w-full pl-9 p-3 bg-white border border-gray-200 rounded-xl text-xs outline-none focus:ring-1 focus:ring-sky-400" title="Pastikan Anda menyalin 'Image Address' atau Alamat Gambar yang berakhiran .jpg / .png" />
                                                      </div>
                                                  </div>
                                              </div>
                                          </div>
                                          
                                          {row.img && (
                                              <div className="mt-4 flex justify-center bg-white p-2 rounded-xl border border-gray-100 relative">
                                                  <img src={row.img} onError={(e)=>{e.target.style.display='none'; alert('Gambar dari link tersebut tidak dapat dimuat. Pastikan itu adalah URL gambar langsung (berakhiran jpg/png).')}} alt="Preview" className="max-h-32 rounded-lg shadow-sm" />
                                                  <button onClick={()=>updateRow(row.id, 'img', null)} className="absolute -top-2 -right-2 bg-red-500 text-white p-1.5 rounded-full shadow hover:bg-red-600"><Trash2 size={14}/></button>
                                              </div>
                                          )}
                                      </div>
                                  </div>
                              ))}
                          </div>

                          <div className="mt-6 flex flex-col sm:flex-row gap-4">
                              <button onClick={addRow} className="flex-1 flex justify-center items-center gap-2 bg-sky-50 text-sky-600 font-bold py-4 rounded-2xl hover:bg-sky-100 transition border border-sky-100">
                                  <Plus size={20} /> Tambah Kegiatan Baru
                              </button>
                              <button onClick={handleGenerate} className="flex-1 flex justify-center items-center gap-2 bg-sky-500 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-sky-600 hover:shadow-xl transition transform hover:-translate-y-1">
                                  <FileText size={20} /> Buat Laporan Lengkap
                              </button>
                          </div>
                      </div>
                  </div>
              );
          }

          // PREVIEW MODE (Tabel Baku)
          return (
            <div className="animate-fade-in portrait-page">
              <div id="preview-controls" className="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6 print:hidden bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                  <div className="flex items-center gap-3">
                    <div className="bg-green-100 text-green-600 p-2 rounded-xl"><CheckCircle size={24}/></div>
                    <div>
                        <h3 className="font-bold text-gray-800">Preview Dokumen</h3>
                        <p className="text-xs text-gray-500">Tampilan baku siap unduh ke PDF</p>
                    </div>
                  </div>
                  <div className="flex flex-wrap gap-2 w-full sm:w-auto justify-end">
                    <button onClick={()=>setMode('form')} disabled={isGenerating} className="flex items-center justify-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-3 rounded-xl transition font-bold text-sm w-full sm:w-auto disabled:opacity-50">
                      <Edit size={18} /> Edit Kembali
                    </button>
                    {/* HANYA ADA 1 TOMBOL DOWNLOAD PDF UTAMA SEKARANG */}
                    <button onClick={handleDownloadPDF} disabled={isGenerating} className="flex items-center justify-center gap-2 bg-sky-500 hover:bg-sky-600 text-white px-6 py-3 rounded-xl shadow-lg transition font-bold text-sm w-full sm:w-auto disabled:opacity-50">
                      {isGenerating ? <span className="animate-pulse">Memproses PDF...</span> : <><Download size={18} /> Download Laporan (PDF)</>}
                    </button>
                  </div>
              </div>
              
              {/* Layout dengan overflow-x-auto agar tidak pecah di layar HP sebelum di-pdf */}
              <div className="overflow-x-auto w-full bg-white rounded-xl shadow-sm print:shadow-none print:overflow-visible">
                  <div id="printable-area" className="bg-white p-8 print:p-0 mx-auto w-full min-w-[700px] sm:min-w-full max-w-[900px] text-black">
                    <div className="text-center mb-10">
                      <h2 className="font-bold text-[18px] uppercase">LAPORAN KEGIATAN SARJANA PENGGERAK MEMBANGUN DESA (SPMD)</h2>
                      <h2 className="font-bold text-[16px] uppercase">KABUPATEN LOMBOK UTARA</h2>
                      <div className="flex justify-center items-center gap-2 mt-2 font-semibold text-[15px]">
                         <span>BULAN</span>
                         <span className="uppercase font-bold">{monthPeriod || "..................................................."}</span>
                      </div>
                    </div>

                    <div className="mb-6 space-y-3 text-[14px]">
                      <div className="flex gap-4 items-center">
                          <span className="w-20 font-semibold">Nama</span>
                          <span className="font-bold uppercase">: {user.username}</span>
                      </div>
                      <div className="flex gap-4 items-center">
                          <span className="w-20 font-semibold">NIK</span>
                          <span className="font-bold">: </span> 
                      </div>
                      <div className="flex gap-4 items-center">
                          <span className="w-20 font-semibold">Jabatan</span>
                          <span className="font-bold">: SPMD/PLKB Non PNS</span>
                      </div>
                    </div>

                    <div className="w-full mb-10">
                      <table className="f1-table w-full">
                        <colgroup>
                            <col style={{width: '6%'}}/>
                            <col style={{width: '22%'}}/>
                            <col style={{width: '37%'}}/>
                            <col style={{width: '10%'}}/>
                            <col style={{width: '25%'}}/>
                        </colgroup>
                        <thead>
                          <tr className="bg-gray-100 print:bg-gray-100 text-center font-bold">
                            <th>No</th>
                            <th>Hari/tanggal</th>
                            <th>Uraian Kegiatan</th>
                            <th>Persentase</th>
                            <th>Dokumentasi</th>
                          </tr>
                        </thead>
                        <tbody>
                          {rows.map((row, index) => (
                            <tr key={row.id}>
                              <td className="text-center align-top pt-3">{index + 1}</td>
                              <td className="align-top whitespace-pre-wrap px-3">{row.date}</td>
                              <td className="align-top whitespace-pre-wrap px-3">{row.desc}</td>
                              <td className="text-center align-middle font-bold">{row.percent}</td>
                              <td className="text-center align-middle p-2">
                                 {row.img ? (
                                    <img src={row.img} alt="Doc" className="max-h-[120px] max-w-[95%] object-contain mx-auto rounded border border-gray-200 p-1" />
                                 ) : (
                                    <div className="min-h-[100px]"></div>
                                 )}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    {/* Signature Block - Mode Preview */}
                    <div className="flex justify-end mt-16 w-full pr-10">
                        <SignaturePad titleTop="Pelaksana Kegiatan" namePlaceholder={`(${user.username.toUpperCase()})`} isPreview={true} />
                    </div>
                  </div>
              </div>
            </div>
          );
        }

        // --- F/I/DAL/13 (Link Excel) ---
        function F1Dal13View({ user }) {
          return (
            <div className="animate-fade-in flex justify-center py-6 sm:py-10">
              <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border-t-4 border-emerald-500 relative overflow-hidden">
                <div className="w-20 h-20 mx-auto bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500 mb-6 shadow-sm">
                  <FileText size={40} />
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">Format Laporan F/I/Dal/13</h2>
                <div className="w-16 h-1 bg-emerald-500 mx-auto rounded-full mb-6"></div>
                
                <p className="text-gray-600 mb-8 leading-relaxed">
                  Untuk menjaga kerapian dan presisi format sesuai standar BKKBN Pusat, pengisian form F/I/Dal/13 wajib menggunakan template Microsoft Excel resmi.
                </p>

                <a 
                  href="https://docs.google.com/spreadsheets/d/1AlS5F1pzCx1bS5UUumtAOvWBQtu5o6Gt/edit?usp=drive_link&ouid=101925882132539477377&rtpof=true&sd=true" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="inline-flex items-center justify-center gap-3 w-full sm:w-auto bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transition duration-300 transform hover:-translate-y-1"
                >
                  <Download size={24} />
                  Download Format Excel F/I/Dal/13
                </a>
              </div>
            </div>
          );
        }

        // --- GOOGLE DRIVE ABSENSI VIEW ---
        function AbsenView({ user }) {
          return (
            <div className="animate-fade-in flex justify-center py-6 sm:py-10">
              <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-xl max-w-2xl w-full text-center border-t-4 border-indigo-500 relative overflow-hidden">
                <div className="w-20 h-20 mx-auto bg-indigo-50 rounded-full flex items-center justify-center text-indigo-500 mb-6 shadow-sm">
                  <CalendarDays size={40} />
                </div>
                
                <h2 className="text-2xl font-bold text-gray-800 mb-2">Format Absensi Manual</h2>
                <div className="w-16 h-1 bg-indigo-500 mx-auto rounded-full mb-6"></div>
                
                <p className="text-gray-600 mb-8 leading-relaxed">
                  Tabel absensi sekarang diisi secara tertulis. Silakan unduh format absen resmi Kabupaten Lombok Utara melalui tautan Google Drive di bawah ini, kemudian cetak dan isi secara manual.
                </p>

                <a 
                  href="https://drive.google.com/file/d/1hLfaDdAUe-hVwXkc-EhpPN-HnDA8LER7/view?usp=sharing" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="inline-flex items-center justify-center gap-3 w-full sm:w-auto bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 px-8 rounded-2xl shadow-lg transition duration-300 transform hover:-translate-y-1"
                >
                  <Download size={24} />
                  Download Format Absensi
                </a>
              </div>
            </div>
          );
        }

        // --- ABOUT VIEW (Updated & Rapi) ---
        function AboutView() {
          return (
            <div className="animate-fade-in flex justify-center py-6 sm:py-10">
              <div className="bg-white p-6 sm:p-10 rounded-3xl shadow-xl max-w-3xl w-full border-t-4 border-sky-500 relative overflow-hidden">
                <div className="absolute -top-16 -right-16 w-40 h-40 bg-sky-50 rounded-full blur-3xl"></div>
                <div className="absolute -bottom-16 -left-16 w-40 h-40 bg-blue-50 rounded-full blur-3xl"></div>
                
                <div className="relative z-10 text-center">
                  <div className="w-24 h-24 mx-auto bg-gradient-to-tr from-sky-400 to-blue-600 rounded-3xl shadow-lg flex items-center justify-center text-white mb-6 transform rotate-3 hover:rotate-0 transition duration-300">
                    <img src="logo-spmd.png" alt="Logo SPMD" className="w-16 h-16 object-contain bg-white rounded-2xl p-1" onError={(e)=>{e.target.style.display='none'}} />
                  </div>
                  <h2 className="text-3xl font-black text-gray-800 mb-2 tracking-tight">SPMD KLU Report</h2>
                  <p className="text-sky-600 font-bold mb-6">Inisiatif Digital BKKBN Kabupaten Lombok Utara</p>
                  
                  <p className="text-gray-600 mb-10 leading-relaxed text-[15px] sm:text-base max-w-2xl mx-auto">
                    Aplikasi ini dirancang sebagai wadah terintegrasi untuk mempermudah rekan-rekan SPMD (Sarjana Penggerak Membangun Desa) dan PLKB Non-PNS di lingkungan Kabupaten Lombok Utara dalam menyusun laporan kegiatan serta mengakses format administratif secara fleksibel di mana pun berada.
                  </p>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 text-left">
                     {/* Info Pengembang */}
                     <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-md transition">
                        <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2 border-b pb-2"><User size={20} className="text-sky-500"/> Developer & Admin</h3>
                        <ul className="space-y-4 text-[14px] text-gray-600">
                          <li className="flex flex-col gap-1">
                             <span className="font-bold text-gray-800">Ahmad Yani</span>
                             <span className="text-xs bg-sky-100 text-sky-700 w-max px-2 py-0.5 rounded">Creator</span>
                          </li>
                          <li className="flex items-center gap-3">
                             <div className="bg-green-100 p-2 rounded-lg text-green-600"><MessageCircle size={16}/></div>
                             <a href="https://wa.me/6285956684081" target="_blank" className="hover:text-green-600 font-medium transition">0859-5668-4081 (Chat Admin)</a>
                          </li>
                          <li className="flex items-center gap-3">
                             <div className="bg-pink-100 p-2 rounded-lg text-pink-600"><Instagram size={16}/></div>
                             <a href="https://instagram.com/_raokin" target="_blank" className="hover:text-pink-600 font-medium transition">@_raokin</a>
                          </li>
                        </ul>
                     </div>

                     {/* Jaringan Website */}
                     <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-md transition">
                        <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2 border-b pb-2"><Globe size={20} className="text-sky-500"/> Jaringan Kami</h3>
                        <p className="text-[13px] text-gray-500 mb-4">Sistem ini dikembangkan dan berada di bawah naungan Semeton Web Store. Tertarik membuat website atau sistem informasi serupa?</p>
                        <ul className="space-y-3 text-[14px]">
                          <li>
                             <a href="https://semetonweb.store" target="_blank" className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-sky-50 transition border border-gray-100 hover:border-sky-200 group">
                                <Globe size={18} className="text-gray-400 group-hover:text-sky-500" />
                                <span className="font-bold text-gray-700 group-hover:text-sky-600">semetonweb.store</span>
                             </a>
                          </li>
                          <li>
                             <a href="https://djangkos.com" target="_blank" className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-sky-50 transition border border-gray-100 hover:border-sky-200 group">
                                <Globe size={18} className="text-gray-400 group-hover:text-sky-500" />
                                <span className="font-bold text-gray-700 group-hover:text-sky-600">djangkos.com</span>
                             </a>

                     </div>
                  </div>

                  <p className="text-xs text-gray-400 font-medium border-t pt-6">
                    &copy; 2026 SPMD Report Kabupaten Lombok Utara
                  </p>
                </div>
              </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
